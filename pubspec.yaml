name: etoda_nagcarlan
description: "This project is a Fare Matrix Calculator and Digital TODA system for Nagcarlan."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # --- NETWORKING & API ---
  # Used to connect to your Golang/PostgreSQL backend
  http: ^1.1.0

  # --- UI & STYLE ---
  cupertino_icons: ^1.0.8
  # For professional Nagcarlan branding fonts
  google_fonts: ^8.0.2

  # --- PASSENGER FEATURES ---
  # For scanning Driver QR codes
  mobile_scanner: ^7.2.0

  # --- DRIVER FEATURES ---
  # For generating unique Driver ID QR codes
  qr_flutter: ^4.1.0

  # --- REAL-TIME & QUEUE LOGIC ---
  # For digital queueing and location-based fare verification
  geolocator: ^14.0.2

  # --- STATE MANAGEMENT ---
  # For managing user roles (Passenger vs Driver) across the app
  provider: ^6.1.2

  # --- LOCAL STORAGE ---
  # To save login sessions or recent trip history offline
  shared_preferences: ^2.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Add assets here if you have a TODA or Nagcarlan logo
  # assets:
  #   - assets/logo.png